services:
  backend:
    build: ./backend
    ports:
      - "8030:8000"
    environment:
      - MARKETDATA_TOKEN=${MARKETDATA_TOKEN}
      - FMP_API_KEY=${FMP_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # Trade Journal (J1) — owner gate. All optional: with none set, every
      # journal route 403s (fail closed). Never set JOURNAL_DEV_OPEN here.
      - JOURNAL_TOKEN=${JOURNAL_TOKEN:-}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN:-}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD:-}
    volumes:
      - ./backend/data:/app/data
      - ./utils:/app/utils
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
